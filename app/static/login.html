<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediVault — Patient Portal</title>
    <meta name="description" content="Login or Sign Up to access your medical records">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-primary);
        }
        
        .auth-container {
            width: 100%;
            max-width: 480px;
            padding: 2rem;
            margin: 1rem;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-logo {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-lg);
            background: var(--primary-container);
            color: var(--primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .auth-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--on-surface);
            margin-bottom: 0.5rem;
        }

        .auth-subtitle {
            color: var(--on-surface-variant);
            font-size: 0.95rem;
        }

        .auth-tabs {
            display: flex;
            background: var(--surface-variant);
            padding: 4px;
            border-radius: var(--radius-lg);
            margin-bottom: 2rem;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--on-surface-variant);
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
        }

        .auth-tab.active {
            background: var(--surface);
            color: var(--primary);
            box-shadow: var(--elevation-1);
        }

        .form-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .form-section.active {
            display: block;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card auth-container">
        <div class="auth-header">
            <div class="auth-logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                </svg>
            </div>
            <h1 class="auth-title">Welcome to MediVault</h1>
            <p class="auth-subtitle">Access your medical records and appointments securely.</p>
        </div>

        <div class="auth-tabs">
            <div class="auth-tab active" onclick="switchTab('login')">Login</div>
            <div class="auth-tab" onclick="switchTab('signup')">Sign Up</div>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="form-section active">
            <div class="form-group">
                <label for="login-id">Patient ID</label>
                <input type="number" id="login-id" placeholder="Enter your Patient ID" required min="1">
            </div>
            <button type="submit" class="btn btn-primary" id="login-btn">
                Log In
            </button>
            <p class="auth-subtitle" style="text-align: center; margin-top: 1rem; font-size: 0.8rem;">
                (Use ID 1 or 2 for testing)
            </p>
        </form>

        <!-- Sign Up Form -->
        <form id="signup-form" class="form-section">
            <div class="form-group">
                <label for="signup-name">Preferred Name</label>
                <input type="text" id="signup-name" placeholder="E.g., John" required>
            </div>
            <div class="form-group">
                <label for="signup-legal-name">Full Legal Name</label>
                <input type="text" id="signup-legal-name" placeholder="John Doe" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="signup-dob">Date of Birth</label>
                    <input type="date" id="signup-dob" required>
                </div>
                <div class="form-group">
                    <label for="signup-blood">Blood Group</label>
                    <select id="signup-blood" class="select-input">
                        <option value="">Select</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="signup-gov-id">Government ID Number</label>
                <input type="text" id="signup-gov-id" placeholder="ID Number" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="signup-phone">Phone Number</label>
                    <input type="tel" id="signup-phone" placeholder="Your number" required>
                </div>
                <div class="form-group">
                    <label for="signup-emergency">Emergency Contact</label>
                    <input type="tel" id="signup-emergency" placeholder="Emergency number" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" id="signup-btn" style="margin-top: 1rem;">
                Create Account
            </button>
        </form>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        const API_BASE = '';

        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.auth-tab')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('signup-form').classList.add('active');
            }
        }

        // Login Logic
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const patientId = document.getElementById('login-id').value;
            const btn = document.getElementById('login-btn');
            
            try {
                btn.disabled = true;
                btn.textContent = 'Logging in...';
                
                const res = await fetch(`${API_BASE}/patients/${patientId}`);
                if (!res.ok) throw new Error('Patient ID not found. Please sign up.');
                
                const patient = await res.json();
                
                // Store in session storage for simple auth state
                sessionStorage.setItem('currentPatientId', patient.patient_id);
                sessionStorage.setItem('currentPatientName', patient.name);
                
                showToast(`Welcome back, ${patient.name}!`, 'success');
                setTimeout(() => window.location.href = '/', 1000);
                
            } catch (err) {
                showToast(err.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Log In';
            }
        });

        // Signup Logic
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('signup-btn');
            
            const payload = {
                name: document.getElementById('signup-name').value,
                full_legal_name: document.getElementById('signup-legal-name').value,
                date_of_birth: document.getElementById('signup-dob').value,
                blood_group: document.getElementById('signup-blood').value || null,
                government_id_number: document.getElementById('signup-gov-id').value,
                phone_number: document.getElementById('signup-phone').value,
                emergency_contact: document.getElementById('signup-emergency').value
            };

            try {
                btn.disabled = true;
                btn.textContent = 'Creating account...';
                
                const res = await fetch(`${API_BASE}/patients/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!res.ok) {
                    const error = await res.json();
                    throw new Error(error.detail || 'Failed to create account');
                }
                
                const newPatient = await res.json();
                
                sessionStorage.setItem('currentPatientId', newPatient.patient_id);
                sessionStorage.setItem('currentPatientName', newPatient.name);
                
                showToast(`Account created! Your Patient ID is ${newPatient.patient_id}`, 'success');
                
                // Redirect after showing the ID
                setTimeout(() => {
                    alert(`IMPORTANT: Please save your Patient ID: ${newPatient.patient_id}. You will need it to log in.`);
                    window.location.href = '/';
                }, 1500);
                
            } catch (err) {
                showToast(err.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });

        // Toast Helper
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span>${message}</span>`;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('show'));
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }
    </script>
</body>
</html>
